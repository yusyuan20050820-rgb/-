<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的抽卡遊戲 - UI 升級版</title>
    <style>
        /* CSS：負責外觀 */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; }
        
        .draw-container { margin-top: 50px; }
        
        #result-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            min-height: 300px;
        }

        /* 卡片基本樣式 */
        .card {
            width: 200px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            border: 4px solid #ccc;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card:hover { transform: translateY(-10px); }

        /* 根據稀有度設定邊框與發光 */
        .ssr { border-color: #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.6); }
        .sr  { border-color: #a335ee; }
        .r   { border-color: #007bff; }
        .n   { border-color: #888888; }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* 讓圖片不變形地填滿 */
            border-radius: 8px;
        }

        .card-info { margin-top: 15px; }
        .card-name { font-size: 1.2em; font-weight: bold; margin: 5px 0; }
        .rarity-label { color: #666; font-size: 0.9em; }

        button {
            padding: 10px 25px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>✨ 幻獸召喚系統 ✨</h1>

    <div class="draw-container">
        <button onclick="handleDraw(1)">單抽</button>
        <button onclick="handleDraw(10)">十連抽</button>
    </div>

    <div id="result-display"></div>

    <script>
        // JS：負責資料與邏輯
        const cardData = [
            { id: 1, rarity: "SSR", name: "闇黑龍", img: "carddd/1.jpg", chance: 1, className: "ssr" },
            { id: 2, rarity: "SSR", name: "光之守護者", img: "carddd/2.jpg", chance: 1, className: "ssr" },
            { id: 3, rarity: "SR", name: "闇影刺客", img: "carddd/3.jpg", chance: 7, className: "sr" },
            { id: 4, rarity: "SR", name: "銀翼弓箭手", img: "carddd/4.jpg", chance: 8, className: "sr" },
           { id: 5, rarity: "R", name: "森林遊俠", img: "carddd/5.jpg", chance: 15, className: "r" },
            { id: 6, rarity: "R", name: "深海祭司", img: "carddd/6.jpg", chance: 18, className: "r" },
            { id: 7, rarity: "N", name: "哥布林工兵", img: "carddd/7.jpg", chance: 25, className: "n" },
            { id: 8, rarity: "N", name: "初級冒險者", img: "carddd/8.jpg", chance: 25, className: "n" }
        ];

        function handleDraw(count) {
            const display = document.getElementById('result-display');
            display.innerHTML = ""; // 先清空上次的結果

            for (let i = 0; i < count; i++) {
                const card = getRandomCard();
                const cardElement = createCardHTML(card);
                display.innerHTML += cardElement;
            }
        }

        function getRandomCard() {
            const rand = Math.floor(Math.random() * 100) + 1;
            let cumulative = 0;
            for (let card of cardData) {
                cumulative += card.chance;
                if (rand <= cumulative) return card;
            }
        }

        function createCardHTML(card) {
            return `
                <div class="card ${card.className}">
                    <img src="${card.img}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Missing+Image'">
                    <div class="card-info">
                        <div class="rarity-label">[${card.rarity}]</div>
                        <div class="card-name">${card.name}</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
